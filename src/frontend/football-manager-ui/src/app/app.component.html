<div class="app-shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <span class="brand-mark">FM</span>
      <span>
        <strong>Football Manager</strong>
        <small>Phase 0 Bootstrap</small>
      </span>
    </a>

    <nav class="nav">
      @for (item of navigation; track item.path) {
        <a
          [routerLink]="item.path"
          class="nav-link"
          routerLinkActive="nav-link-active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }">
          {{ item.label }}
        </a>
      }
    </nav>
  </header>

  <main class="content">
    <section class="hero">
      <p class="eyebrow">Monorepo bootstrap</p>
      <h1>Angular, .NET, PostgreSQL, and seeded data in one stack.</h1>
      <p class="hero-copy">
        This phase establishes the runtime foundation. Gameplay flows land in later phases.
      </p>
    </section>

    <router-outlet />
  </main>
</div>
